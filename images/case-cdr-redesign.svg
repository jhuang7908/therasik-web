    <circle cx="590" cy="330" r="12"/>
    <circle cx="1035" cy="290" r="8"/>
  </g>

  <circle cx="495" cy="272" r="14" fill="#7c3aed" opacity="0.18" filter="url(#soft)"/>
  <circle cx="495" cy="272" r="7" fill="#7c3aed" opacity="0.45"/>

  <circle cx="770" cy="318" r="14" fill="#7c3aed" opacity="0.18" filter="url(#soft)"/>
