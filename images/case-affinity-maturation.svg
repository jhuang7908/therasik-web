<svg width="1200" height="675" viewBox="0 0 1200 675" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="675" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f0fdfa"/>
      <stop offset="0.55" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#ccfbf1"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d9488" stop-opacity="0.75"/>
      <stop offset="1" stop-color="#2dd4bf" stop-opacity="0.30"/>
    </linearGradient>
    <pattern id="dots" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.2" fill="#0d9488" opacity="0.09"/>
    </pattern>
    <filter id="soft">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="675" fill="url(#bg)"/>
  <rect width="1200" height="675" fill="url(#dots)"/>

  <g opacity="0.55" fill="none" stroke="url(#line)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" filter="url(#soft)">
    <path d="M200 320 C 340 280, 460 380, 600 300 S 820 220, 1040 310"/>
    <path d="M240 420 C 380 400, 470 460, 590 390 S 760 280, 880 380 S 1000 470, 1060 400" stroke-width="4" opacity="0.80"/>
  </g>

  <g fill="#0d9488" opacity="0.22">
    <circle cx="200" cy="320" r="8"/>
    <circle cx="600" cy="300" r="12"/>
    <circle cx="1040" cy="310" r="8"/>
  </g>

  <circle cx="490" cy="455" r="14" fill="#7c3aed" opacity="0.18" filter="url(#soft)"/>
  <circle cx="490" cy="455" r="7" fill="#7c3aed" opacity="0.45"/>

  <circle cx="760" cy="285" r="14" fill="#7c3aed" opacity="0.18" filter="url(#soft)"/>
  <circle cx="760" cy="285" r="7" fill="#7c3aed" opacity="0.45"/>

  <path d="M497 452 C 560 340, 680 290, 753 289"
        fill="none" stroke="#7c3aed" stroke-width="2.5"
        stroke-linecap="round" stroke-dasharray="8 6" opacity="0.35"/>

  <g font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
    <text x="40" y="72" font-size="14" fill="#0f766e" font-weight="800" letter-spacing="2" opacity="0.9">CASE STUDY</text>
    <text x="40" y="118" font-size="34" fill="#111827" font-weight="750">HER2 VHH</text>
    <text x="40" y="158" font-size="24" fill="#7c3aed" font-weight="700" opacity="0.75">Affinity Maturation</text>
    <text x="40" y="188" font-size="13" fill="#6b7280" font-weight="500">VGRW-SR-R2 to G49A+F112L epistatic discovery</text>
  </g>
</svg>
