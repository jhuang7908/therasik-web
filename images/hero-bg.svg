<svg width="1440" height="600" viewBox="0 0 1440 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="line-grad" x1="0" y1="0" x2="1440" y2="600" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#a7f3d0" stop-opacity="0.10"/>
    </linearGradient>
    <filter id="blur-sm">
      <feGaussianBlur stdDeviation="1.5"/>
    </filter>
    <pattern id="hex-grid" x="0" y="0" width="80" height="139" patternUnits="userSpaceOnUse">
      <path d="M40 0 L80 23.1 L80 69.3 L40 92.4 L0 69.3 L0 23.1 Z" fill="none" stroke="#ffffff" stroke-width="0.8" opacity="0.10"/>
      <path d="M40 46.2 L80 69.3 L80 115.5 L40 138.6 L0 115.5 L0 69.3 Z" fill="none" stroke="#ffffff" stroke-width="0.8" opacity="0.06"/>
    </pattern>
    <radialGradient id="glow-1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a7f3d0" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#a7f3d0" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Hex grid texture (very subtle, on dark bg) -->
  <rect width="100%" height="100%" fill="url(#hex-grid)" />

  <!-- Ambient glows -->
  <ellipse cx="300" cy="200" rx="250" ry="200" fill="url(#glow-1)" />
  <ellipse cx="1100" cy="400" rx="300" ry="220" fill="url(#glow-2)" />
  <ellipse cx="720" cy="100" rx="200" ry="150" fill="url(#glow-1)" />

  <!-- Corner ornaments -->
  <g fill="#ffffff" opacity="0.22">
    <circle cx="120" cy="110" r="2.2" />
    <circle cx="170" cy="150" r="1.8" />
    <circle cx="210" cy="95" r="1.4" />
    <circle cx="1285" cy="465" r="2.2" />
    <circle cx="1335" cy="510" r="1.7" />
    <circle cx="1260" cy="535" r="1.3" />
  </g>
  <g stroke="#ffffff" stroke-width="1" opacity="0.12">
    <line x1="120" y1="110" x2="170" y2="150" />
    <line x1="170" y1="150" x2="210" y2="95" />
    <line x1="1285" y1="465" x2="1335" y2="510" />
    <line x1="1335" y1="510" x2="1260" y2="535" />
  </g>

  <!-- Bio: mini-helix (upper-right) -->
  <g fill="none" stroke="#a7f3d0" stroke-width="1.8" opacity="0.28">
    <path d="M940 92 C980 60 1020 60 1060 92 C1100 124 1140 124 1180 92 C1220 60 1260 60 1300 92" />
    <path d="M940 124 C980 156 1020 156 1060 124 C1100 92 1140 92 1180 124 C1220 156 1260 156 1300 124" />
    <path d="M980 108 L1020 108" />
    <path d="M1060 108 L1100 108" />
    <path d="M1140 108 L1180 108" />
    <path d="M1220 108 L1260 108" />
  </g>

  <!-- AI: circuit traces (lower-left) -->
  <g fill="none" stroke="#a7f3d0" stroke-width="1.55" opacity="0.28" stroke-linecap="round" stroke-linejoin="round">
    <path d="M260 455 H350 V510 H430" />
    <path d="M290 485 H370" />
    <path d="M370 485 V435 H460" />
    <path d="M320 530 H395 V565" />
  </g>
  <g fill="#a7f3d0" opacity="0.30">
    <circle cx="260" cy="455" r="2.4" />
    <circle cx="350" cy="455" r="2.1" />
    <circle cx="350" cy="510" r="2.1" />
    <circle cx="430" cy="510" r="2.2" />
    <circle cx="290" cy="485" r="1.9" />
    <circle cx="370" cy="485" r="2.0" />
    <circle cx="370" cy="435" r="1.9" />
    <circle cx="460" cy="435" r="2.1" />
    <circle cx="320" cy="530" r="1.8" />
    <circle cx="395" cy="530" r="1.8" />
    <circle cx="395" cy="565" r="1.8" />
  </g>
</svg>
