    <circle cx="620" cy="290" r="10"/>
  </g>

  <circle cx="708" cy="360" r="72" fill="url(#haptenGlow)" filter="url(#soft)"/>
  <circle cx="708" cy="360" r="10" fill="#f59e0b" opacity="0.70"/>
  <circle cx="680" cy="338" r="6" fill="#fbbf24" opacity="0.75"/>
  <circle cx="740" cy="338" r="6" fill="#fbbf24" opacity="0.75"/>
  <path d="M648 387 C 680 340, 740 332, 778 362"
